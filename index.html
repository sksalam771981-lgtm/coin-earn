<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral Zone Video</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0b0c1b; color: #ffffff; display: flex; flex-direction: column; min-height: 100vh; padding-bottom: 75px; }
        
        .header-card { background: #18192d; margin: 15px; padding: 20px; border-radius: 16px; text-align: center; border: 1px solid #23243f; }
        .header-title { font-size: 22px; font-weight: 800; color: #a855f7; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .header-subtitle { color: #94a3b8; font-size: 13px; margin-top: 6px; }

        .tab-content { display: none; padding: 0 15px; }
        .tab-content.active { display: block; }

        .search-container { position: relative; margin-bottom: 20px; }
        .search-input { width: 100%; padding: 14px 45px 14px 18px; background-color: #18192d; border: 1px solid #282945; border-radius: 25px; color: #fff; font-size: 14px; outline: none; }
        .search-btn { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); width: 36px; height: 36px; background: #a855f7; border: none; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; }

        /* Video Post Cards (Clickable) */
        .post-card { background-color: #18192d; border: 1px solid #23243f; border-radius: 16px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.2s; }
        .post-card:active { background-color: #23243f; }
        .post-info { display: flex; align-items: center; gap: 12px; }
        .play-icon { width: 40px; height: 40px; background: #a855f7; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; }
        .post-title { font-size: 15px; font-weight: 600; color: #f8fafc; }

        /* Video Detail / Player Page (Second Page) */
        #video-player-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0c1b; z-index: 2000; padding: 15px; overflow-y: auto; }
        .back-btn { background: #18192d; border: 1px solid #23243f; color: #fff; padding: 10px 16px; border-radius: 20px; cursor: pointer; margin-bottom: 15px; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
        .player-container { width: 100%; height: 250px; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; }
        .player-container iframe { width: 100%; height: 100%; border: none; }
        .player-title { font-size: 18px; font-weight: bold; color: #fff; }

        .loading-container { text-align: center; padding: 40px 0; color: #64748b; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #121324; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #1e1f38; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #64748b; background: none; border: none; width: 25%; font-size: 11px; }
        .nav-item.active { color: #ff3b5c; }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div class="header-card">
        <div class="header-title">VIRAL ZONE VIDEO <i class="fa-solid fa-fire" style="color:#ff3b5c;"></i></div>
        <div class="header-subtitle">Exclusive Premium Video</div>
    </div>

    <!-- HOME TAB -->
    <div id="home-tab" class="tab-content active">
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="ভিডিও খুঁজুন..." onkeyup="filterVideos()">
            <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <div id="video-list-container">
            <div class="loading-container">Loading...</div>
        </div>
    </div>

    <!-- SECOND PAGE: VIDEO PLAYER VIEW -->
    <div id="video-player-page">
        <button class="back-btn" onclick="closePlayer()"><i class="fa-solid fa-arrow-left"></i> পেছনে যান</button>
        <div class="player-container">
            <iframe id="main-iframe" src="" allowfullscreen></iframe>
        </div>
        <div class="player-title" id="main-title"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <button class="nav-item active"><i class="fa-solid fa-house"></i><span>হোম</span></button>
        <button class="nav-item"><i class="fa-solid fa-heart"></i><span>পছন্দ</span></button>
        <button class="nav-item"><i class="fa-solid fa-book-open"></i><span>টিউটোরিয়াল</span></button>
        <button class="nav-item"><i class="fa-solid fa-link"></i><span>লিংক</span></button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCtKYGQ-fvuVifuDNJ_tlNmKJ2gjEqyYWU",
            authDomain: "viralzone-3e974.firebaseapp.com",
            databaseURL: "https://viralzone-3e974-default-rtdb.firebaseio.com",
            projectId: "viralzone-3e974",
            storageBucket: "viralzone-3e974.firebasestorage.app",
            messagingSenderId: "63267470809",
            appId: "1:63267470809:web:fa7f5d92063e69c42aadc8"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let allVideos = [];

        database.ref('videos').on('value', (snapshot) => {
            allVideos = [];
            if(!snapshot.exists()) {
                document.getElementById('video-list-container').innerHTML = '<p style="text-align:center; color:#64748b;">কোনো পোস্ট পাওয়া যায়নি।</p>';
                return;
            }

            snapshot.forEach((childSnapshot) => {
                allVideos.push(childSnapshot.val());
            });

            renderPosts(allVideos);
        });

        function renderPosts(videos) {
            const container = document.getElementById('video-list-container');
            container.innerHTML = '';

            videos.reverse().forEach((video) => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.onclick = () => openPlayer(video.title, video.url);
                card.innerHTML = `
                    <div class="post-info">
                        <div class="play-icon"><i class="fa-solid fa-play"></i></div>
                        <div class="post-title">${video.title}</div>
                    </div>
                    <i class="fa-solid fa-chevron-right" style="color:#64748b;"></i>
                `;
                container.appendChild(card);
            });
        }

        // Open Second Page Player
        function openPlayer(title, url) {
            document.getElementById('main-iframe').src = url;
            document.getElementById('main-title').innerText = title;
            document.getElementById('video-player-page').style.display = 'block';
        }

        // Close Second Page Player
        function closePlayer() {
            document.getElementById('main-iframe').src = '';
            document.getElementById('video-player-page').style.display = 'none';
        }

        function filterVideos() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allVideos.filter(v => v.title.toLowerCase().includes(query));
                renderPosts(filtered);
        }
    </script>
</body>
</html>
