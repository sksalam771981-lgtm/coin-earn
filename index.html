<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral Zone Video</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Telegram & Firebase SDKs -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Adsgram Monetization Script -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0b0c1b; color: #ffffff; padding-bottom: 75px; }
        
        /* Header Banner */
        .header-card { background: #18192d; margin: 15px; padding: 20px; border-radius: 16px; text-align: center; border: 1px solid #23243f; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .header-title { font-size: 22px; font-weight: 800; color: #a855f7; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .header-subtitle { color: #94a3b8; font-size: 13px; margin-top: 6px; }

        /* Search & Categories */
        .search-container { position: relative; margin: 0 15px 15px 15px; }
        .search-input { width: 100%; padding: 12px 40px 12px 15px; background-color: #18192d; border: 1px solid #282945; border-radius: 20px; color: #fff; font-size: 14px; outline: none; }
        .search-btn { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; background: #a855f7; border: none; border-radius: 50%; color: #fff; cursor: pointer; }

        .category-bar { display: flex; gap: 10px; overflow-x: auto; padding: 0 15px 15px 15px; scrollbar-width: none; }
        .category-btn { background: #18192d; border: 1px solid #282945; color: #94a3b8; padding: 8px 16px; border-radius: 20px; font-size: 13px; white-space: nowrap; cursor: pointer; }
        .category-btn.active { background: #a855f7; color: #fff; border-color: #a855f7; }

        /* Tabs Logic */
        .tab-content { display: none; padding: 0 15px; }
        .tab-content.active { display: block; }

        /* Post & Video Cards */
        .post-card { background: #18192d; border: 1px solid #23243f; border-radius: 16px; overflow: hidden; margin-bottom: 15px; position: relative; }
        .thumb-box { position: relative; width: 100%; height: 200px; background: #000; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; }
        .badge-ads { position: absolute; top: 10px; right: 10px; background: rgba(255, 59, 92, 0.9); color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .post-body { padding: 14px; }
        .post-title { font-size: 15px; font-weight: 600; color: #f8fafc; margin-bottom: 12px; }
        .btn-unlock { width: 100%; padding: 12px; background: linear-gradient(90deg, #a855f7, #ff3b5c); border: none; border-radius: 10px; color: #fff; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Full Page Video Player Modal (Second Page) */
        #player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0c1b; z-index: 2000; padding: 15px; overflow-y: auto; }
        .back-btn { background: #18192d; border: 1px solid #23243f; color: #fff; padding: 8px 16px; border-radius: 20px; margin-bottom: 15px; cursor: pointer; font-size: 14px; }
        .iframe-box { width: 100%; height: 240px; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #23243f; }
        .iframe-box iframe { width: 100%; height: 100%; border: none; }

        /* Tutorial Card */
        .tutorial-card { background-color: #18192d; border-radius: 16px; padding: 15px; border: 1px solid #23243f; }
        .step-list { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        .step-item { display: flex; align-items: center; gap: 12px; color: #e2e8f0; font-size: 14px; }
        .step-number { width: 26px; height: 26px; background-color: #262744; color: #a855f7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; flex-shrink: 0; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #121324; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #1e1f38; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #64748b; background: none; border: none; width: 25%; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: #ff3b5c; }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div class="header-card">
        <div class="header-title">VIRAL ZONE VIDEO <i class="fa-solid fa-fire" style="color:#ff3b5c;"></i></div>
        <div class="header-subtitle">Exclusive Premium Video</div>
    </div>

    <!-- Category Scroll Bar -->
    <div class="category-bar">
        <button class="category-btn active" onclick="filterCategory('all', this)">সবগুলো</button>
        <button class="category-btn" onclick="filterCategory('viral', this)">ভাইরাল কন্টেন্ট</button>
        <button class="category-btn" onclick="filterCategory('natok', this)">নাটক / মুভি</button>
    </div>

    <!-- 1. HOME TAB -->
    <div id="home-tab" class="tab-content active">
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="ভিডিও খুঁজুন..." onkeyup="filterVideos()">
            <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <div id="video-list-container">
            <p style="text-align:center; color:#64748b; padding:30px 0;">লোড হচ্ছে...</p>
        </div>
    </div>

    <!-- 2. FAVORITE TAB -->
    <div id="favorite-tab" class="tab-content">
        <h3 style="color:#ff3b5c; margin-bottom:15px;"><i class="fa-solid fa-heart"></i> পছন্দের ভিডিও</h3>
        <p style="text-align:center; color:#64748b; margin-top:30px;">কোনো পছন্দের পোস্ট সেভ করা নেই।</p>
    </div>

    <!-- 3. TUTORIAL TAB -->
    <div id="tutorial-tab" class="tab-content">
        <h3 style="color:#a855f7; margin-bottom:15px;"><i class="fa-solid fa-book-open"></i> টিউটোরিয়াল</h3>
        <div class="tutorial-card">
            <div class="step-list">
                <div class="step-item"><span class="step-number">১</span><span>UNLOCK বাটনে ক্লিক করুন।</span></div>
                <div class="step-item"><span class="step-number">২</span><span>বিজ্ঞাপন বা অ্যাড সম্পূর্ণভাবে দেখুন।</span></div>
                <div class="step-item"><span class="step-number">৩</span><span>বিজ্ঞাপন শেষে অটোমেটিক ফুল ভিডিও প্লে হবে।</span></div>
            </div>
        </div>
    </div>

    <!-- 4. LINKS TAB -->
    <div id="links-tab" class="tab-content">
        <h3 style="color:#a855f7; margin-bottom:15px;"><i class="fa-solid fa-link"></i> প্রয়োজনীয় লিংক</h3>
        <div class="tutorial-card" style="text-align:center; color:#94a3b8;">
            <p>নতুন লিংক শীঘ্রই প্রকাশ করা হবে।</p>
        </div>
    </div>

    <!-- SECOND PAGE / PLAYER OVERLAY -->
    <div id="player-modal">
        <button class="back-btn" onclick="closePlayer()"><i class="fa-solid fa-arrow-left"></i> পেছনে যান</button>
        <div class="iframe-box">
            <iframe id="main-player" src="" allowfullscreen></iframe>
        </div>
        <h3 id="player-title" style="margin-top:15px; color:#fff;"></h3>
    </div>

    <!-- Bottom Nav Bar -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home-tab', this)"><i class="fa-solid fa-house"></i><span>হোম</span></button>
        <button class="nav-item" onclick="switchTab('favorite-tab', this)"><i class="fa-solid fa-heart"></i><span>পছন্দ</span></button>
        <button class="nav-item" onclick="switchTab('tutorial-tab', this)"><i class="fa-solid fa-book-open"></i><span>টিউটোরিয়াল</span></button>
        <button class="nav-item" onclick="switchTab('links-tab', this)"><i class="fa-solid fa-link"></i><span>লিংক</span></button>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCtKYGQ-fvuVifuDNJ_tlNmKJ2gjEqyYWU",
            authDomain: "viralzone-3e974.firebaseapp.com",
            databaseURL: "https://viralzone-3e974-default-rtdb.firebaseio.com",
            projectId: "viralzone-3e974",
            storageBucket: "viralzone-3e974.firebasestorage.app",
            messagingSenderId: "63267470809",
            appId: "1:63267470809:web:fa7f5d92063e69c42aadc8"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        let allVideos = [];
        let adsgramBlockId = ""; // Firebase থেকে লাইভ ডাউনলোড হবে

        // Realtime Data Sync
        database.ref('videos').on('value', (snapshot) => {
            const container = document.getElementById('video-list-container');
            container.innerHTML = '';
            allVideos = [];

            if(!snapshot.exists()) {
                container.innerHTML = '<p style="text-align:center; color:#64748b; margin-top:20px;">কোনো পোস্ট পাওয়া যায়নি।</p>';
                return;
            }

            snapshot.forEach((childSnapshot) => {
                allVideos.push(childSnapshot.val());
            });

            renderVideos(allVideos);
        });

        // Adsgram Block ID Sync
        database.ref('ad_config/adsgram_id').on('value', (snapshot) => {
            if(snapshot.exists()) adsgramBlockId = snapshot.val();
        });

        function renderVideos(videos) {
            const container = document.getElementById('video-list-container');
            container.innerHTML = '';

            videos.slice().reverse().forEach((video) => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="thumb-box">
                        <img class="thumb-img" src="${video.thumb || 'https://via.placeholder.com/400x200'}" alt="thumb">
                        <span class="badge-ads"><i class="fa-solid fa-lock"></i> ${video.adsCount || 1} Ads</span>
                    </div>
                    <div class="post-body">
                        <div class="post-title">${video.title}</div>
                        <button class="btn-unlock" onclick="unlockContent('${video.title}', '${video.url}')">
                            <i class="fa-solid fa-play"></i> আনলক করে ভিডিও দেখুন
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Adsgram Monetization Trigger
        function unlockContent(title, url) {
            if (typeof Adsgram !== 'undefined' && adsgramBlockId !== "") {
                const AdController = Adsgram.init({ blockId: adsgramBlockId });
                AdController.show().then((result) => {
                    openPlayer(title, url);
                }).catch((result) => {
                    openPlayer(title, url); // Fallback
                });
            } else {
                openPlayer(title, url);
            }
        }

        function openPlayer(title, url) {
            document.getElementById('main-player').src = url;
            document.getElementById('player-title').innerText = title;
            document.getElementById('player-modal').style.display = 'block';
        }

        function closePlayer() {
            document.getElementById('main-player').src = '';
            document.getElementById('player-modal').style.display = 'none';
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }

        function filterVideos() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allVideos.filter(v => v.title.toLowerCase().includes(query));
            renderVideos(filtered);
        }

        function filterCategory(cat, element) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            if(cat === 'all') {
                renderVideos(allVideos);
            } else {
                const filtered = allVideos.filter(v => v.category === cat);
                renderVideos(filtered);
            }
        }
    </script>
</body>
</html>
