<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Money Earn Mini App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f2f2f2;
text-align:center;
}

.header{
background:#0088cc;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}

.balance{
background:white;
margin:15px;
padding:25px;
border-radius:15px;
font-size:25px;
font-weight:bold;
box-shadow:0 2px 8px #ccc;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:15px;
}

button{
padding:18px;
border:none;
border-radius:15px;
background:white;
font-size:16px;
box-shadow:0 2px 8px #ccc;
}

button:active{
background:#0088cc;
color:white;
}

.footer{
margin-top:20px;
color:#777;
}

</style>

</head>


<body>


<div class="header">
💰 Money Earn Mini App
</div>


<div class="balance">

💰 Balance <br>

<span id="money">0</span> টাকা

</div>



<div class="menu">


<button onclick="home()">
🏠 Home
</button>


<button onclick="profile()">
👤 Profile
</button>


<button onclick="balance()">
💰 Balance
</button>


<button onclick="ads()">
📺 Watch Ads
<br>
(Monetag)
</button>


<button onclick="bonus()">
🎁 Daily Bonus
</button>


<button onclick="referral()">
👥 Referral
</button>


<button onclick="tasks()">
📋 Tasks
</button>


<button onclick="withdraw()">
💸 Withdraw
</button>


<button onclick="admin()">
⚙️ Admin Panel
</button>


</div>



<div class="footer">

Powered By Telegram Mini App

</div>




<script>


let money = 0;



function home(){

alert("🏠 Welcome Home");

}



function profile(){

alert("👤 User Profile");

}



function balance(){

alert("💰 Your Balance: "+money+" টাকা");

}



function ads(){

alert("📺 Watch Ads Opened");

// Monetag এখানে যুক্ত করবেন

money += 10;

document.getElementById("money").innerHTML = money;

alert("✅ 10 টাকা যোগ হয়েছে");

}




function bonus(){

money += 50;

document.getElementById("money").innerHTML = money;

alert("🎁 Daily Bonus 50 টাকা পেয়েছেন");

}





function referral(){

alert("👥 Referral Link তৈরি হয়েছে");

}





function tasks(){

alert("📋 Tasks Complete করে টাকা আয় করুন");

}




function withdraw(){


let method = prompt(
"💸 Withdraw Method নির্বাচন করুন:\n\n"+
"1. বিকাশ\n"+
"2. নগদ\n"+
"3. রকেট"
);



if(method){


let number = prompt(
"📱 আপনার মোবাইল নাম্বার লিখুন"
);



let amount = prompt(
"💰 Withdraw Amount লিখুন\n\nMinimum Withdraw: 1000 টাকা"
);



if(amount < 1000){


alert(
"❌ Minimum Withdraw 1000 টাকা"
);


}

else if(amount > money){


alert(
"❌ আপনার Balance পর্যাপ্ত নয়"
);


}

else{


money = money - amount;

document.getElementById("money").innerHTML = money;


alert(
"✅ Withdraw Request Submitted\n\n"+
"Method: "+method+
"\nNumber: "+number+
"\nAmount: "+amount+" টাকা"
);


}


}


}




function admin(){

alert("⚙️ Admin Panel");

}




// Telegram Mini App

let tg = window.Telegram.WebApp;

tg.expand();


</script>


</body>
</html>
